<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario de Registro</title>
</head>
<body>

    <h1>Formulario de Registro</h1>

    <form action="https://httpbin.org/post" method="POST">

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"  placeholder="Escribe tu nombre" required>
        <br><br>

        <label for="clave">Contraseña:</label>
        <input type="password" id="clave" name="clave" placehonlder="Escribre una contraseña" required>
        <br><br>

        <p>Género:</p>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label>

        <input type="radio" id="femenino" name="genero" value="femenino">
        <label for="femenino">Femenino</label>
        <br><br>

        <label for="Comentrio">Intereses:</labe><br>
        <textarea id="IN" name="IN" placeholder="Escribe tu actividad ..."></textarea><br>

        <br><br>

        <label for="pais">País:</label>
        <select id="pais" name="pais">
            <option value="">Seleccione un país</option>
            <option value="argentina">Argentina</option>
            <option value="Brasil">Brasil</option>
            <option value="colombia">Colombia</option>
            <option value="chile">Chile</option>
            <option value="eu">EE. UU.</option>          
            <option value="">Republica Dominicana</option>
             <option value="rusia">Rusia</option>
            <option value="mexico">México</option>
        </select>
        <br><br>

        <label for="comentarios">Comentarios:</label>
        <br>
        <textarea id="comentarios" name="comentarios" rows="5" cols="40" placeholder="Escribe tus comentarios..."></textarea>
        <br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>

    </form>

</body>
</html>
